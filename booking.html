        <main>
            <section class="booking-container">
                <h1>Book Your Appointment</h1>


    <form id="bookingForm">

        <label>Full Name</label>
        <input type="text" id="name" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <!-- SERVICE SELECTION (IMPROVED) -->
        <label>Select Service</label>
        <select id="service" required>
            <option value="">-- Choose a service --</option>

            <optgroup label="💅 Basic Services">
                <option value="basic-manicure">Basic Manicure</option>
                <option value="basic-pedicure">Basic Pedicure</option>
            </optgroup>

            <optgroup label="✨ Gel Services">
                <option value="gel-manicure">Gel Manicure</option>
                <option value="gel-pedicure">Gel Pedicure</option>
            </optgroup>

            <optgroup label="💎 Acrylic Services">
                <option value="full-set-acrylic">Full Set Acrylic</option>
                <option value="fill-acrylic">Acrylic Fill</option>
            </optgroup>

            <optgroup label="🎨 Nail Art & Designs">
                <option value="simple-nail-art">Simple Nail Art</option>
                <option value="advanced-nail-art">Advanced Nail Art</option>
                <option value="custom-design">Custom Design</option>
            </optgroup>

        </select>

        <label>Choose Date</label>
        <input type="date" id="date" required>

        <label>Choose Time</label>
        <input type="time" id="time" required>

        <label>Special Requests</label>
        <textarea id="notes" rows="4" placeholder="Describe your nail design idea..."></textarea>

        <button type="submit">Book Now</button>

    </form>

    <p id="message"></p>

</section>
<!-- JAVASCRIPT -->

    <script>

    document.getElementById("bookingForm").addEventListener("submit", function(event){

    event.preventDefault();

    let name =
    document.getElementById("name").value;

    let date =
    document.getElementById("date").value;

    let service =
    document.getElementById("service").value;

    let message =
    "Hello, my name is " + name +
    ". I would like to book " +
    service +
    " on " + date;

    let whatsappURL =
    "https://wa.me/26777981109?text=" +
    encodeURIComponent(message);

    window.open(whatsappURL, "_blank");

    });

    </script>
